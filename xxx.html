 <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Beast_Store">
    
    <title>Beast_Store - Exclusivo iOS</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0f;
            background-image: radial-gradient(circle at center, #151522 0%, #0a0a0f 100%);
            color: #00ffcc;
            font-family: -apple-system, BlinkMacSystemFont, 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding-top: env(safe-area-inset-top, 40px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
            overflow-x: hidden;
        }

        /* --- TELA DE BLOQUEIO (ANDROID/PC) --- */
        #lock-screen {
            display: none; /* Escondido por padrão */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            color: #ff3333;
        }

        #lock-screen h1 {
            text-shadow: 0 0 10px #ff3333, 0 0 20px #ff3333;
            border-bottom: 1px solid rgba(255, 51, 51, 0.3);
            font-size: 28px;
        }

        #lock-screen p {
            font-size: 14px;
            margin-top: 20px;
            color: #ff9999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- PAINEL PRINCIPAL (IOS) --- */
        #app-panel {
            display: none; /* Escondido por padrão, liberado pelo JS */
            background: rgba(15, 15, 25, 0.85);
            border: 1px solid #00ffcc;
            border-radius: 16px;
            padding: 30px 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2), inset 0 0 15px rgba(0, 255, 204, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 22px;
            text-shadow: 0 0 10px #00ffcc, 0 0 20px #00ffcc;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.3);
            padding-bottom: 15px;
        }

        .setting {
            margin-bottom: 30px;
        }

        .setting label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            height: 30px;
        }
        
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            background: #1a1a2e;
            border-radius: 4px;
            border: 1px solid #00ffcc;
        }

        input[type=range]::-webkit-slider-thumb {
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #00ffcc;
            -webkit-appearance: none;
            margin-top: -9px;
            box-shadow: 0 0 12px #00ffcc;
        }

        .toggle-btn {
            background-color: transparent;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.2s ease;
        }

        .toggle-btn:active {
            transform: scale(0.98);
        }

        .toggle-btn.active {
            background-color: #00ffcc;
            color: #0a0a0f;
            box-shadow: 0 0 15px #00ffcc;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .status span {
            color: #00ffcc;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <!-- TELA DE BLOQUEIO (VISTA POR ANDROID/PC) -->
    <div id="lock-screen">
        <h1>ACESSO NEGADO</h1>
        <p>Sistema restrito.<br>Este painel da Beast_Store funciona exclusivamente no ecossistema iOS (iPhone/iPad).</p>
    </div>

    <!-- PAINEL PRINCIPAL (VISTO APENAS NO IOS) -->
    <div class="panel" id="app-panel">
        <h1>Beast_Store</h1>
        
        <div class="setting">
            <label><span>Assistência de Mira</span> <span id="assist-val">50%</span></label>
            <input type="range" min="0" max="100" value="50" oninput="document.getElementById('assist-val').innerText = this.value + '%'">
        </div>

        <div class="setting">
            <label><span>Sensibilidade de Câmera</span> <span id="sens-val">75%</span></label>
            <input type="range" min="0" max="100" value="75" oninput="document.getElementById('sens-val').innerText = this.value + '%'">
        </div>

        <div class="setting">
            <label><span>Campo de Visão (FOV)</span> <span id="fov-val">90</span></label>
            <input type="range" min="60" max="120" value="90" oninput="document.getElementById('fov-val').innerText = this.value">
        </div>

        <div class="setting">
            <button class="toggle-btn" onclick="this.classList.toggle('active')">Estabilização Dinâmica</button>
        </div>

        <div class="setting">
            <button class="toggle-btn" onclick="this.classList.toggle('active')">Realce de Contraste</button>
        </div>

        <div class="setting">
            <button class="toggle-btn" onclick="this.classList.toggle('active')">Modo Performance</button>
        </div>

        <div class="status">
            Sistema iOS <span>Online</span>
        </div>
    </div>

    <!-- SCRIPT DE VERIFICAÇÃO DO DISPOSITIVO -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Detecta se é iPhone, iPod ou iPad
            var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            
            // Detecta iPads mais recentes que mascaram o User Agent como Mac
            var isMacWithTouch = (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

            // Validação
            if (isIOS || isMacWithTouch) {
                // Se for iOS, mostra o painel
                document.getElementById('app-panel').style.display = 'block';
            } else {
                // Se NÃO for iOS, mostra a tela de bloqueio
                document.getElementById('lock-screen').style.display = 'flex';
            }
        });
    </script>

</body>
</html>
